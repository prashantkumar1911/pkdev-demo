# Writing github actions workflow for build java apps, upload artifacts to githhub packages and 
# then push to dockerhub.
---
name: Java CI with Maven
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read  

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout code
          uses: actions/checkout@v6
          
        - name: Set up JDK 21
          uses: actions/setup-java@v5
          with:
            java-version: '21'
            distribution: 'temurin'
        
        - name: Make .mvnw executable
          run: chmod +x ./mvnw

        - name: Build with Maven
          run: ./mvnw clean package

        - name: Upload artifact to GitHub Packages
          uses: actions/upload-artifact@v7
          with:
            name: pkdev-demo-artifact
            path: target/*.jar
            if-no-files-found: warn
            retention-days: 7


        - name: Verify target directory
          run: ls -l target/

        - name: Build Docker image
          run: docker build \
            -t ${{ vars.DOCKERHUB_USERNAME }}/pkdev-demo:${{ github.sha }} \
            -t ${{ vars.DOCKERHUB_USERNAME }}/pkdev-demo:latest \
            .

        - name: Log in to DockerHub
          uses: docker/login-action@v4
          with:
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_PASSWORD }}
            

        - name: Push Docker image to DockerHub
          run: |
            docker push ${{ vars.DOCKERHUB_USERNAME }}/pkdev-demo:${{ github.sha }}
            docker push ${{ vars.DOCKERHUB_USERNAME }}/pkdev-demo:latest

    
    deploy:
        if: github.event_name == 'push'
        runs-on: self-hosted
        needs: build

        steps:

        - name: Pull docker image to ec2 instance
          run: |
            docker pull ${{ vars.DOCKERHUB_USERNAME }}/pkdev-demo:${{ github.sha }}
           
        - name: Stop and remove existing container
          run: |
            docker rm -f pkdev-demo-container || true

        - name: Run new container
          run: |
            docker run -d \
                --name pkdev-demo-container \
                --restart unless-stopped \
                -p 8080:8080 \
                ${{ vars.DOCKERHUB_USERNAME }}/pkdev-demo:${{ github.sha }}

        - name: Verify container is running
          run: |
            docker ps

        - name: Remove Unused Images
          run: |
            docker image prune -af

        - name: Verify application is running
          run: |
            sleep 20
            curl --fail http://localhost:8080

        - name: Show container logs
          if: failure()
          run: |
            docker logs pkdev-demo-container